<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>雅思学习计划</title>
<style>
* {margin:0;padding:0;box-sizing:border-box}
:root {--bg:#0a0e27;--bg2:#0f1535;--card:#1a1f3a;--card2:#252d4a;--border:rgba(255,255,255,.08);--text:#e8eef7;--muted:#8892b0;--gold:#ffc107;--listening:#00d4ff;--reading:#ff6b6b;--writing:#51cf66;--speaking:#da77f2;--review:#ffa94d}
html {scroll-behavior:smooth}
body {font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);color:var(--text);min-height:100vh;background-attachment:fixed}
.hdr {text-align:center;padding:3rem 1rem 2rem;background:linear-gradient(180deg,rgba(0,212,255,.05) 0%,transparent 100%)}
.hdr h1 {font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,#00d4ff,#da77f2,#ffc107);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem;letter-spacing:-1px}
.sub {color:var(--muted);font-size:.95rem;margin-bottom:1.5rem}
.progress-section {max-width:700px;margin:0 auto;padding:0 1rem 2rem}
.progress-label {display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem}
.progress-label span {font-size:.85rem;font-weight:600}
.progress-label .pct {color:var(--gold);font-size:1.1rem;font-weight:700}
.progress-bar {height:8px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,.3)}
.progress-fill {height:100%;background:linear-gradient(90deg,var(--listening),var(--reading),var(--writing),var(--speaking),var(--review));border-radius:10px;transition:width .6s cubic-bezier(.34,.1,.68,.55);width:0;box-shadow:0 0 20px rgba(0,212,255,.5)}
.progress-info {display:flex;gap:1rem;margin-top:1rem;flex-wrap:wrap}
.info-item {flex:1;min-width:120px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.8rem;text-align:center}
.info-item .label {font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem}
.info-item .value {font-size:1.3rem;font-weight:700;color:var(--gold)}
.sr {display:flex;justify-content:center;gap:.8rem;padding:1rem;flex-wrap:wrap}
.sc {font-size:.8rem;padding:.4rem .9rem;border-radius:50px;background:var(--card);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;gap:.4rem}
.sc b {color:var(--text);font-weight:600}
.nav {display:flex;align-items:center;justify-content:center;gap:1.2rem;padding:1.2rem;position:sticky;top:0;z-index:50;background:rgba(10,14,39,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.nb {width:40px;height:40px;border-radius:50%;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;font-weight:bold}
.nb:hover {background:var(--card2);border-color:var(--gold);transform:scale(1.1)}
.dd {min-width:180px;text-align:center}
.dn {font-size:1.8rem;font-weight:900;color:var(--gold);line-height:1}
.dl {font-size:.8rem;color:var(--muted);margin-top:.2rem}
.tbtn {padding:.4rem 1rem;border-radius:50px;border:2px solid var(--gold);background:rgba(255,193,7,.1);color:var(--gold);font-size:.8rem;cursor:pointer;font-weight:600;transition:all .3s}
.tbtn:hover {background:var(--gold);color:var(--bg)}
.mt {display:flex;justify-content:center;gap:.5rem;padding:1rem;flex-wrap:wrap;background:rgba(0,0,0,.2)}
.mo {padding:.4rem .9rem;border-radius:50px;font-size:.8rem;cursor:pointer;border:2px solid var(--border);background:var(--card);color:var(--muted);transition:all .3s;font-weight:600}
.mo:hover {color:var(--text);border-color:var(--muted)}
.mo.act {color:#fff;border-color:var(--gold);background:rgba(255,193,7,.15)}
.wo {max-width:700px;margin:0 auto;padding:1.5rem 1rem}
.wt {font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.8rem;font-weight:700}
.wr {display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.8rem;scroll-behavior:smooth}
.wr::-webkit-scrollbar {height:4px}
.wr::-webkit-scrollbar-track {background:rgba(255,255,255,.05)}
.wr::-webkit-scrollbar-thumb {background:rgba(255,255,255,.2);border-radius:2px}
.wd {flex-shrink:0;width:48px;text-align:center;cursor:pointer;border-radius:12px;padding:.6rem .3rem;border:2px solid var(--border);background:var(--card);transition:all .3s}
.wd:hover {background:var(--card2);border-color:var(--muted)}
.wd.act {background:linear-gradient(135deg,rgba(255,193,7,.2),rgba(0,212,255,.2));border-color:var(--gold);box-shadow:0 0 15px rgba(255,193,7,.3)}
.wd.td {border-color:var(--gold);box-shadow:0 0 10px rgba(255,193,7,.2)}
.wday {font-size:.65rem;color:var(--muted);margin-bottom:.2rem;font-weight:600}
.wnum {font-size:1rem;font-weight:900;color:var(--text)}
.wd.act .wnum {color:var(--gold);font-size:1.1rem}
.wdots {display:flex;justify-content:center;gap:2px;margin-top:.4rem;flex-wrap:wrap}
.wdot {width:5px;height:5px;border-radius:50%;transition:all .3s}
.wdot.dn {background:var(--gold);box-shadow:0 0 4px var(--gold)}
.wdot.td {background:rgba(255,255,255,.15)}
.ml {text-align:center;font-size:.8rem;color:var(--gold);padding:.8rem 0;font-weight:700;letter-spacing:.05em}
.cw {max-width:700px;margin:0 auto;padding:0 1rem 3rem;display:flex;flex-direction:column;gap:.8rem}
.tc {background:linear-gradient(135deg,var(--card),var(--card2));border:2px solid var(--border);border-radius:14px;padding:1.2rem;display:flex;align-items:flex-start;gap:1rem;position:relative;overflow:hidden;transition:all .3s;animation:slideIn .4s ease-out}
.tc::before {content:"";position:absolute;left:0;top:0;bottom:0;width:4px;transition:all .3s}
.tc.m1::before {background:linear-gradient(180deg,var(--listening),rgba(0,212,255,.3))}
.tc.m2::before {background:linear-gradient(180deg,var(--reading),rgba(255,107,107,.3))}
.tc.m3::before {background:linear-gradient(180deg,var(--writing),rgba(81,207,102,.3))}
.tc.m4::before {background:linear-gradient(180deg,var(--speaking),rgba(218,119,242,.3))}
.tc.m5::before {background:linear-gradient(180deg,var(--review),rgba(255,169,77,.3))}
.tc:hover {border-color:var(--gold);box-shadow:0 8px 30px rgba(0,0,0,.4);transform:translateY(-2px)}
.tc.td {border-color:var(--gold);background:linear-gradient(135deg,rgba(255,193,7,.08),rgba(0,212,255,.05));box-shadow:0 0 30px rgba(255,193,7,.15)}
.md {width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:6px;transition:all .3s}
.md.m1 {background:var(--listening);box-shadow:0 0 8px var(--listening)}
.md.m2 {background:var(--reading);box-shadow:0 0 8px var(--reading)}
.md.m3 {background:var(--writing);box-shadow:0 0 8px var(--writing)}
.md.m4 {background:var(--speaking);box-shadow:0 0 8px var(--speaking)}
.md.m5 {background:var(--review);box-shadow:0 0 8px var(--review)}
.tb {flex:1}
.th {display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem;flex-wrap:wrap}
.badge {font-size:.75rem;font-weight:700;padding:.2rem .6rem;border-radius:50px}
.badge.m1 {background:rgba(0,212,255,.2);color:var(--listening)}
.badge.m2 {background:rgba(255,107,107,.2);color:var(--reading)}
.badge.m3 {background:rgba(81,207,102,.2);color:var(--writing)}
.badge.m4 {background:rgba(218,119,242,.2);color:var(--speaking)}
.badge.m5 {background:rgba(255,169,77,.2);color:var(--review)}
.tt {font-size:.75rem;color:var(--muted);background:rgba(255,255,255,.05);padding:.15rem .5rem;border-radius:6px;border:1px solid rgba(255,255,255,.1)}
.td {font-size:.9rem;line-height:1.5;color:var(--text)}
.tn {font-size:.75rem;color:var(--muted);margin-top:.5rem;display:flex;align-items:center;gap:.4rem}
.tn span {flex:1;min-width:70px}
.tn input {background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:var(--text);font-size:.75rem;padding:.3rem .5rem;min-width:100px;transition:all .3s}
.tn input:focus {outline:none;border-color:var(--gold);background:rgba(255,193,7,.08);box-shadow:0 0 10px rgba(255,193,7,.2)}
.chk {width:22px;height:22px;border-radius:6px;border:2px solid rgba(255,255,255,.2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.8rem;background:transparent;transition:all .3s;font-weight:bold}
.chk:hover {border-color:var(--gold)}
.chk.dn {background:var(--gold);border-color:var(--gold);color:var(--bg);box-shadow:0 0 10px var(--gold)}
.es {text-align:center;padding:3rem 1rem;color:var(--muted)}
@keyframes slideIn {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.tc:nth-child(1) {animation-delay:.05s}
.tc:nth-child(2) {animation-delay:.1s}
.tc:nth-child(3) {animation-delay:.15s}
.tc:nth-child(4) {animation-delay:.2s}
@media(max-width:600px){.hdr h1{font-size:1.8rem}.nav{gap:.8rem;padding:.8rem}.mo{padding:.3rem .7rem;font-size:.75rem}.cw{padding:0 .8rem 2rem}.tc{padding:.9rem}.wd{width:44px}}
</style>
</head>

var TODAY = "2026-03-26";
var cur = TODAY, mod = 0, done = {};
try { var ls = localStorage.getItem("ielts-done"); if (ls) done = JSON.parse(ls); } catch(e) {}

var MN = ["","听力","阅读","写作","口语","复盘"];

function $(id) { return document.getElementById(id); }
function key(t) { return t.date + "|" + t.time; }

function fmt(d) {
  var dt = new Date(d + "T00:00:00");
  var wd = ["周日","周一","周二","周三","周四","周五","周六"];
  return { wd: wd[dt.getDay()], day: dt.getDate(), month: dt.getMonth() + 1 };
}

function weekDays(d) {
  var dt = new Date(d + "T00:00:00");
  dt.setDate(dt.getDate() - dt.getDay());
  var r = [];
  for (var i = 0; i < 7; i++) {
    var nd = new Date(dt);
    nd.setDate(dt.getDate() + i);
    r.push(nd.toISOString().slice(0, 10));
  }
  return r;
}

function updateProgress() {
  var total = 0, dc = 0;
  TASKS.forEach(function(t) {
    if (t.date <= cur) { total++; if (done[key(t)]) dc++; }
  });
  var pct = total ? Math.round(dc / total * 100) : 0;
  $("pf").style.width = pct + "%";
  $("pp").textContent = pct + "%";
  
  var byM = [0,0,0,0,0,0], byD = [0,0,0,0,0,0];
  TASKS.forEach(function(t) {
    if (t.date <= cur) { byM[t.m]++; if (done[key(t)]) byD[t.m]++; }
  });
  var html = "";
  for (var i = 1; i <= 5; i++) {
    if (byM[i] > 0) html += "<span class=sc><b>" + MN[i] + "</b> " + byD[i] + "/" + byM[i] + "</span>";
  }
  $("sr").innerHTML = html;
}

function updateAllProgress() {
  var total = TASKS.length, dc = 0;
  TASKS.forEach(function(t) { if (done[key(t)]) dc++; });
  var pct = total ? Math.round(dc / total * 100) : 0;
  $("pf-all").style.width = pct + "%";
  $("pct-all").textContent = pct + "%";
  $("done-all").textContent = dc;
  $("total-all").textContent = total;
  
  var endDate = new Date("2026-06-25T00:00:00");
  var today = new Date(cur + "T00:00:00");
  var daysLeft = Math.max(0, Math.ceil((endDate - today) / (1000 * 60 * 60 * 24)));
  $("days-left").textContent = daysLeft;
}

function updateWeek() {
  var week = weekDays(cur);
  var html = "";
  week.forEach(function(d) {
    var w = fmt(d);
    var isCur = d === cur, isToday = d === TODAY;
    var dayTasks = TASKS.filter(function(t) { return t.date === d; });
    var doneCount = dayTasks.filter(function(t) { return done[key(t)]; }).length;
    var dots = "";
    dayTasks.slice(0, 4).forEach(function(t) {
      dots += "<span class=wdot " + (done[key(t)] ? "dn" : "td") + "></span>";
    });
    html += "<div class=wd" + (isCur ? " act" : "") + (isToday ? " td" : "") + " onclick=go(\x27" + d + "\x27)>";
    html += "<div class=wday>" + w.wd + "</div><div class=wnum>" + w.day + "</div>";
    html += "<div class=wdots>" + dots + "</div></div>";
  });
  $("wr").innerHTML = html;
}

function updateCards() {
  var filtered = TASKS.filter(function(t) {
    return t.date === cur && (mod === 0 || t.m === mod);
  });
  if (!filtered.length) {
    $("cw").innerHTML = "<div class=es><p>该日期暂无任务</p></div>";
    return;
  }
  var html = "";
  filtered.forEach(function(t, i) {
    var dk = key(t);
    var isDone = !!done[dk];
    var isToday = t.date === TODAY;
    html += "<div class=tc m" + t.m + (isToday ? " td" : "") + ">";
    html += "<div class=md m" + t.m + "></div><div class=tb>";
    html += "<div class=th><span class=badge m" + t.m + ">" + MN[t.m] + "</span>";
    html += "<span class=tt>" + t.time + "</span></div>";
    html += "<div class=td>" + t.detail + "</div>";
    html += "<div class=tn><span>" + t.note + "</span>";
    html += "<input placeholder=记录 value=\x27" + (done[dk]||"") + "\x27 onchange=save(\x27" + dk + "\x27,this.value)>";
    html += "<div class=chk" + (isDone ? " dn" : "") + " onclick=tog(\x27" + dk + "\x27,this)>" + (isDone ? "✓" : "") + "</div>";
    html += "</div></div></div>";
  });
  $("cw").innerHTML = html;
}

function tog(dk, el) {
  done[dk] = done[dk] ? null : new Date().toLocaleTimeString("zh");
  try { localStorage.setItem("ielts-done", JSON.stringify(done)); } catch(e) {}
  el.classList.toggle("dn");
  el.innerHTML = done[dk] ? "✓" : "";
  updateProgress();
  updateAllProgress();
}

function save(dk, v) {
  done[dk] = v;
  try { localStorage.setItem("ielts-done", JSON.stringify(done)); } catch(e) {}
}

function setMod(m) {
  mod = m;
  for (var i = 0; i <= 5; i++) $("b" + i).classList.toggle("act", i === m);
  updateCards();
}

function go(d) {
  cur = d;
  var w = fmt(d);
  $("dn").textContent = w.day;
  $("dl").textContent = w.month + "月 · " + w.wd;
  var mo = {3:"3月", 4:"4月", 5:"5月", 6:"6月"};
  $("ml").textContent = mo[w.month] || "";
  updateWeek();
  updateCards();
  updateProgress();
}

function next(n) {
  var curD = new Date(cur + "T00:00:00");
  curD.setDate(curD.getDate() + n);
  if (curD < new Date("2026-03-12") || curD > new Date("2026-06-25")) return;
  go(curD.toISOString().slice(0, 10));
}

$("b0").onclick = function() { setMod(0); };
$("b1").onclick = function() { setMod(1); };
$("b2").onclick = function() { setMod(2); };
