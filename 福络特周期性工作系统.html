<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>

        .container { max-width: 1600px; margin: 0 auto; }
        .header { background: white; border-radius: 16px; padding: 24px 32px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .header h1 { color: #1a1a2e; font-size: 28px; margin-bottom: 8px; }
        .header .subtitle { color: #666; font-size: 14px; }

        .stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; transition: transform 0.3s; }

        .stat-card .number { font-size: 36px; font-weight: 700; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-card .label { color: #666; font-size: 14px; margin-top: 4px; }
        .filters { background: white; border-radius: 16px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .filters-row { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
        .filter-group { display: flex; align-items: center; gap: 8px; }
        .filter-group label { font-weight: 500; color: #333; white-space: nowrap; }
        .filter-group select, .filter-group input { padding: 10px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; min-width: 120px; }
        .btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-success { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; }
        .btn-danger { background: linear-gradient(135deg, #eb3349, #f45c43); color: white; }
        .progress-section { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .progress-section h2 { color: #1a1a2e; margin-bottom: 20px; font-size: 20px; }
        .unit-progress { margin-bottom: 20px; }
        .unit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .unit-name { font-weight: 600; color: #333; }
        .unit-stats { font-size: 14px; color: #666; }
        .progress-bar { height: 24px; background: #f0f0f0; border-radius: 12px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 12px; transition: width 0.5s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 12px; color: white; font-size: 12px; font-weight: 600; }
        .progress-fill.excellent { background: linear-gradient(90deg, #11998e, #38ef7d); }
        .progress-fill.good { background: linear-gradient(90deg, #667eea, #764ba2); }
        .progress-fill.warning { background: linear-gradient(90deg, #f093fb, #f5576c); }
        .progress-fill.danger { background: linear-gradient(90deg, #eb3349, #f45c43); }
        .tasks-container { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .tasks-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .tasks-header h2 { color: #1a1a2e; font-size: 20px; }
        .task-count { background: #f0f0f0; padding: 6px 16px; border-radius: 20px; font-size: 14px; color: #666; }
        .task-card { background: #fafafa; border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; border-left: 4px solid #667eea; transition: all 0.3s; }
        .task-card:hover { background: #f0f0f0; transform: translateX(4px); }
        .task-card.completed { border-left-color: #38ef7d; background: #f0fff4; }
        .task-card.completed .task-content { opacity: 0.7; text-decoration: line-through; }
        .task-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .task-info { flex: 1; }
        .task-badges { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .badge-unit { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .badge-shift { background: #e0e0e0; color: #333; }
        .badge-shift.day { background: #fff3e0; color: #e65100; }
        .badge-shift.night { background: #1a237e; color: white; }
        .badge-shift.general { background: #e8f5e9; color: #2e7d32; }
        .badge-frequency { background: #f3e5f5; color: #7b1fa2; }
        .task-module { font-weight: 600; color: #1a1a2e; font-size: 15px; margin-bottom: 4px; }
        .task-content { color: #666; font-size: 14px; line-height: 1.6; }
        .task-output { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #ddd; font-size: 13px; color: #888; }
        .task-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-left: 16px; }
        .task-actions button { padding: 6px 12px; font-size: 12px; }
        .complete-date { font-size: 12px; color: #38ef7d; margin-top: 4px; font-weight: 500; }
        .history-record { font-size: 11px; color: #999; margin-top: 4px; }
        .edit-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .edit-modal.active { display: flex; }
        .modal-content { background: white; border-radius: 16px; padding: 32px; max-width: 650px; width: 90%; max-height: 85vh; overflow-y: auto; }
        .modal-content h3 { margin-bottom: 24px; color: #1a1a2e; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #333; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; font-family: inherit; }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
        .history-panel { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        .history-panel h3 { margin-bottom: 16px; color: #1a1a2e; font-size: 18px; }
        .history-item { background: #f9f9f9; padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; font-size: 14px; }
        .history-item .date { color: #667eea; font-weight: 500; }
        .date-navigation { display: flex; align-items: center; gap: 16px; padding: 16px; background: #f8f9fa; border-radius: 12px; }

        .no-tasks { text-align: center; padding: 60px 20px; color: #999; }

    </style>

                <div class="filter-group"><label>🔍 搜索:</label><input type="text" id="searchInput" placeholder="搜索..." oninput="renderAll()"></div>

        function saveData() { localStorage.setItem('fuluote_tasks_v5', JSON.stringify(tasksData)); showSaveIndicator(); }
        function saveHistory() { localStorage.setItem('fuluote_history_v5', JSON.stringify(completionHistory)); }
        function showSaveIndicator() { const el = document.getElementById('saveIndicator'); el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2000); }
        function updateTimeDisplay() { const now = new Date(); document.getElementById('currentTime').textContent = now.toLocaleString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long', hour: '2-digit', minute: '2-digit', second: '2-digit' }); }

        function getShift(unit) {
            if (unit.includes('（白）') || unit.includes('白班')) return 'day';
            if (unit.includes('（夜）') || unit.includes('夜班')) return 'night';
            return 'general';
        }

        function getShiftLabel(shift) {
            if (shift === 'day') return '☀️ 白班';
            if (shift === 'night') return '🌙 夜班';
            return '📋 通用';
        }

        function initFilters() {
            const units = [...new Set(tasksData.map(t => t.unit))].filter(u => u);
            const unitSelect = document.getElementById('unitFilter');
            units.forEach(u => { const opt = document.createElement('option'); opt.value = u; opt.textContent = u; unitSelect.appendChild(opt); });
        }

        function getCurrentDateKey() { const date = new Date(currentDate); date.setDate(date.getDate() + currentDateOffset); return date.toISOString().split('T')[0]; }
        function getWeekKey(date) { const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate())); d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7)); const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1)); const weekNum = Math.ceil((((d - yearStart) / 86400000) + 1) / 7); return d.getUTCFullYear() + '-W' + String(weekNum).padStart(2, '0'); }
        function getMonthKey(date) { return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0'); }
        function getQuarterKey(date) { const q = Math.floor(date.getMonth() / 3) + 1; return date.getFullYear() + '-Q' + q; }
        function getYearKey(date) { return String(date.getFullYear()); }

        function getPeriodKey(task, date) {
            if (task.frequency === '每日') return getCurrentDateKey();
            if (task.frequency === '每周') return getWeekKey(date);
            if (task.frequency === '每月') return getMonthKey(date);
            if (task.frequency === '季度') return getQuarterKey(date);
            if (task.frequency === '年度') return getYearKey(date);
            return getCurrentDateKey();
        }

        function isTaskCompleted(taskId, periodKey) { if (!completionHistory[taskId]) return false; return completionHistory[taskId][periodKey] === true; }
        function getCompletionDate(taskId, periodKey) { if (!completionHistory[taskId]) return null; return completionHistory[taskId][periodKey + '_date'] || null; }

        function setTaskCompletion(taskId, periodKey, completed) {
            if (!completionHistory[taskId]) completionHistory[taskId] = {};
            completionHistory[taskId][periodKey] = completed;
            if (completed) { completionHistory[taskId][periodKey + '_date'] = new Date().toISOString(); }
            else { delete completionHistory[taskId][periodKey + '_date']; }
            saveHistory();
        }

        function getWeekNumber(date) { const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate())); d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7)); return Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(), 0, 1))) / 86400000) + 1) / 7); }

        function getDateRange() {
            const timeFilter = document.getElementById('timeFilter').value;
            const date = new Date(currentDate); date.setDate(date.getDate() + currentDateOffset);
            if (timeFilter === 'daily') return { label: date.toLocaleDateString('zh-CN', {year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'}) };
            if (timeFilter === 'weekly') return { label: date.getFullYear() + '年 第' + getWeekNumber(date) + '周' };
            if (timeFilter === 'monthly') return { label: date.getFullYear() + '年' + (date.getMonth() + 1) + '月' };
            if (timeFilter === 'quarterly') return { label: date.getFullYear() + '年 第' + (Math.floor(date.getMonth() / 3) + 1) + '季度' };
            if (timeFilter === 'yearly') return { label: date.getFullYear() + '年' };
            return null;
        }

        function onTimeFilterChange() { currentDateOffset = 0; currentDate = new Date(); renderAll(); }

        function filterTasks() {
            const timeFilter = document.getElementById('timeFilter').value;
            const unitFilter = document.getElementById('unitFilter').value;
            const shiftFilter = document.getElementById('shiftFilter').value;
            const frequencyFilter = document.getElementById('frequencyFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            const viewDate = new Date(currentDate); viewDate.setDate(viewDate.getDate() + currentDateOffset);
            
            return tasksData.filter(task => {
                if (timeFilter !== 'all') { const freqMap = {'每日': 'daily', '每周': 'weekly', '每月': 'monthly', '季度': 'quarterly', '年度': 'yearly'}; if (freqMap[task.frequency] !== timeFilter && task.frequency !== '按需') return false; }
                if (unitFilter !== 'all' && task.unit !== unitFilter) return false;
                if (shiftFilter !== 'all') {
                    const taskShift = getShift(task.unit);
                    if (shiftFilter === 'day' && taskShift !== 'day') return false;
                    if (shiftFilter === 'night' && taskShift !== 'night') return false;
                    if (shiftFilter === 'general' && taskShift !== 'general') return false;
                }
                if (frequencyFilter !== 'all' && task.frequency !== frequencyFilter) return false;
                const periodKey = getPeriodKey(task, viewDate);
                const isCompleted = isTaskCompleted(task.id, periodKey);
                if (statusFilter === 'completed' && !isCompleted) return false;
                if (statusFilter === 'pending' && isCompleted) return false;
                if (search && !task.content.toLowerCase().includes(search) && !task.module.toLowerCase().includes(search)) return false;
                return true;
            });
        }

        function renderAll() { const tasks = filterTasks(); renderStats(tasks); renderUnitProgress(tasks); renderTasks(tasks); updateDateNavigation(); }

        function renderStats(tasks) {
            const viewDate = new Date(currentDate); viewDate.setDate(viewDate.getDate() + currentDateOffset);
            let completed = 0; tasks.forEach(t => { const pk = getPeriodKey(t, viewDate); if (isTaskCompleted(t.id, pk)) completed++; });
            const total = tasks.length;
            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('pendingTasks').textContent = total - completed;
            document.getElementById('completionRate').textContent = (total > 0 ? Math.round((completed / total) * 100) : 0) + '%';
        }

        function renderUnitProgress(tasks) {
            const container = document.getElementById('unitProgressContainer');
            const units = [...new Set(tasks.map(t => t.unit))].filter(u => u);
            const viewDate = new Date(currentDate); viewDate.setDate(viewDate.getDate() + currentDateOffset);
            if (units.length === 0) { container.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">暂无数据</div>'; return; }
            container.innerHTML = units.map(unit => {
                const ut = tasks.filter(t => t.unit === unit); const total = ut.length;
                let completed = 0; ut.forEach(t => { const pk = getPeriodKey(t, viewDate); if (isTaskCompleted(t.id, pk)) completed++; });
                const rate = total > 0 ? Math.round((completed / total) * 100) : 0;
                let cls = rate >= 90 ? 'excellent' : rate >= 70 ? 'good' : rate >= 50 ? 'warning' : 'danger';
                return '<div class="unit-progress"><div class="unit-header"><span class="unit-name">' + unit + '</span><span class="unit-stats">' + completed + '/' + total + ' 已完成</span></div><div class="progress-bar"><div class="progress-fill ' + cls + '" style="width: ' + rate + '%">' + rate + '%</div></div></div>';
            }).join('');
        }

        function renderTasks(tasks) {
            const container = document.getElementById('tasksList');
            document.getElementById('taskCount').textContent = '共 ' + tasks.length + ' 条任务';
            if (tasks.length === 0) { container.innerHTML = '<div class="no-tasks"><p>暂无符合条件的任务</p></div>'; return; }
            const viewDate = new Date(currentDate); viewDate.setDate(viewDate.getDate() + currentDateOffset);
            
            container.innerHTML = tasks.map(t => {
                const pk = getPeriodKey(t, viewDate);
                const isCompleted = isTaskCompleted(t.id, pk);
                const completionDate = getCompletionDate(t.id, pk);
                const shift = getShift(t.unit);
                const shiftClass = shift === 'day' ? 'day' : shift === 'night' ? 'night' : 'general';
                
                let historyHtml = '';
                if (t.frequency === '每日' && completionHistory[t.id]) {
                    const dates = Object.keys(completionHistory[t.id]).filter(k => !k.endsWith('_date') && completionHistory[t.id][k] === true).sort().reverse().slice(0, 5);
                    if (dates.length > 0) historyHtml = '<div class="history-record">📅 近期完成: ' + dates.join(', ') + '</div>';
                }
                
                let completeDateHtml = '';
                if (isCompleted && completionDate) {
                    const cd = new Date(completionDate);
                    completeDateHtml = '<div class="complete-date">✓ 完成于: ' + cd.toLocaleString('zh-CN') + '</div>';
                }
                
                return '<div class="task-card ' + (isCompleted ? 'completed' : '') + '"><div class="task-top"><div class="task-info"><div class="task-badges"><span class="badge badge-unit">' + t.unit + '</span><span class="badge badge-shift ' + shiftClass + '">' + getShiftLabel(shift) + '</span><span class="badge badge-frequency">' + t.frequency + '</span></div><div class="task-module">' + t.module + '</div><div class="task-content">' + t.content + '</div>' + (t.output ? '<div class="task-output">📄 输出物: ' + t.output + '</div>' : '') + completeDateHtml + historyHtml + '</div><div class="task-actions"><button class="btn ' + (isCompleted ? 'btn-danger' : 'btn-success') + '" onclick="toggleComplete(' + t.id + ')">' + (isCompleted ? '↩ 取消' : '✓ 完成') + '</button><button class="btn btn-primary" onclick="openEditModal(' + t.id + ')">详情</button></div></div></div>';
            }).join('');
        }

        function updateDateNavigation() {
            const timeFilter = document.getElementById('timeFilter').value;
            const nav = document.getElementById('dateNavigation');
            if (timeFilter === 'all') { nav.style.display = 'none'; return; }
            nav.style.display = 'block';
            document.getElementById('dateDisplay').textContent = getDateRange().label;
        }

        function navigateDate(dir) {
            const tf = document.getElementById('timeFilter').value;
            if (tf === 'daily') currentDateOffset += dir;
            else if (tf === 'weekly') currentDateOffset += dir * 7;
            else if (tf === 'monthly') currentDate.setMonth(currentDate.getMonth() + dir);
            else if (tf === 'quarterly') currentDate.setMonth(currentDate.getMonth() + dir * 3);
            else if (tf === 'yearly') currentDate.setFullYear(currentDate.getFullYear() + dir);
            renderAll();
        }

        function goToToday() { currentDateOffset = 0; currentDate = new Date(); renderAll(); }

        function resetFilters() {
            document.getElementById('timeFilter').value = 'daily';
            document.getElementById('unitFilter').value = 'all';
            document.getElementById('shiftFilter').value = 'all';
            document.getElementById('frequencyFilter').value = 'all';
            document.getElementById('statusFilter').value = 'all';
            document.getElementById('searchInput').value = '';
            goToToday();
        }

        function toggleComplete(id) {
            const task = tasksData.find(t => t.id === id);
            if (!task) return;
            const viewDate = new Date(currentDate); viewDate.setDate(viewDate.getDate() + currentDateOffset);
            const pk = getPeriodKey(task, viewDate);
            const isCompleted = isTaskCompleted(id, pk);
            setTaskCompletion(id, pk, !isCompleted);
            renderAll();
        }

        function openEditModal(id) {
            const t = tasksData.find(x => x.id === id);
            if (!t) return;
            document.getElementById('editTaskId').value = id;
            document.getElementById('editUnit').value = t.unit;
            document.getElementById('editShift').value = getShiftLabel(getShift(t.unit));
            document.getElementById('editFrequency').value = t.frequency;
            document.getElementById('editModule').value = t.module;
            document.getElementById('editContent').value = t.content;
            document.getElementById('editOutput').value = t.output || '';
            renderTaskHistory(id);
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() { document.getElementById('editModal').classList.remove('active'); }

        function saveTask() {
            const id = parseInt(document.getElementById('editTaskId').value);
            const t = tasksData.find(x => x.id === id);
            if (!t) return;
            t.content = document.getElementById('editContent').value;
            t.output = document.getElementById('editOutput').value;
            saveData();
            closeEditModal();
            renderAll();
        }

        function renderTaskHistory(taskId) {
            const container = document.getElementById('historyList');
            const history = completionHistory[taskId];
            if (!history || Object.keys(history).length === 0) { container.innerHTML = '<div style="color:#999;">暂无完成记录</div>'; return; }
            const records = [];
            Object.keys(history).forEach(key => {
                if (!key.endsWith('_date') && history[key] === true) {
                    const dateStr = history[key + '_date'];
                    records.push({ period: key, date: dateStr ? new Date(dateStr).toLocaleString('zh-CN') : key });
                }
            });
            records.sort((a, b) => b.period.localeCompare(a.period));
            container.innerHTML = records.slice(0, 20).map(r => '<div class="history-item"><span class="date">' + r.period + '</span> - 完成于 ' + r.date + '</div>').join('') || '<div style="color:#999;">暂无完成记录</div>';
        }

        function exportData() {
            const data = { tasks: tasksData, history: completionHistory };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '福络特任务数据_' + new Date().toISOString().split('T')[0] + '.json';
            a.click();
        }

        document.getElementById('editModal').addEventListener('click', function(e) { if (e.target === this) closeEditModal(); });
    </script>
</body>
</html>
